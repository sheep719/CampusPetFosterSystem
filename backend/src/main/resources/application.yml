server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${MYSQL_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/campus_pet_foster?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&connectTimeout=10000&socketTimeout=60000}}
    username: ${MYSQLUSER:${DATABASE_USERNAME:root}}
    password: ${MYSQLPASSWORD:${DATABASE_PASSWORD:123456}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true

logging:
  level:
    com.example.campuspetfoster: DEBUG
